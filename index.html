<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學自信狀態測驗｜魔數</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand-dark: #00677f;
    --brand-mid: #77c5d5;
    --brand-yellow: #FFF2BD;
    --accent-orange: #eb8424;
    --accent-teal: #34a798;
    --text-primary: #1a1a1a;
    --text-secondary: #4a4a4a;
    --text-tertiary: #888;
    --border: #e0ddd6;
    --white: #ffffff;
    --green: #2e7d4f;
    --green-bg: #eaf4ee;
    --amber: #8a5a00;
    --amber-bg: #fdf3dc;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --radius: 14px;
    --radius-sm: 8px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--brand-yellow);
    color: var(--text-primary);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Hero */
  .hero {
    background: #ffffff;
    color: var(--brand-dark);
    padding: 40px 24px 44px;
    text-align: center;
    border-bottom: 2px solid #77c5d5;
  }
  .hero-logo {
    width: 180px;
    margin: 0 auto 16px;
    display: block;
  }
  .hero-badge {
    display: inline-block;
    background: #e8f4f7;
    border: 1px solid #b0dce6;
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: .06em;
    padding: 4px 16px;
    margin-bottom: 18px;
    color: var(--brand-dark);
    font-weight: 500;
  }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 14px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    color: var(--brand-dark);
  }
  .hero p {
    font-size: 16px;
    color: #2a6070;
    max-width: 420px;
    margin: 0 auto 28px;
    line-height: 1.75;
  }
  .hero-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 16px;
    font-size: 13px;
    color: #2a6070;
  }
  .hero-meta span { display: flex; align-items: center; gap: 5px; }
  .dot-sep { width: 4px; height: 4px; border-radius: 50%; background: rgba(0,103,127,.35); }

  /* Container */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 28px 16px 64px;
  }

  /* Progress */
  .progress-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 24px;
    position: sticky;
    top: 10px;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,103,127,.08);
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 15px; color: var(--text-secondary); }
  .progress-count { font-size: 15px; font-weight: 500; color: var(--brand-dark); }
  .progress-track { height: 6px; background: #e8e8e4; border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s ease, background .4s ease;
    width: 0%;
    background: var(--text-tertiary);
  }

  /* Section */
  .section {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 15px 18px;
    background: #f9f7f0;
    border-bottom: 1px solid var(--border);
  }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 15px; font-weight: 500; flex: 1; color: var(--brand-dark); }
  .section-count { font-size: 13px; color: var(--text-tertiary); }
  .col-header {
    display: flex;
    justify-content: flex-end;
    padding: 6px 18px 4px;
    background: #f9f7f0;
    border-bottom: 1px solid var(--border);
  }
  .col-header span { width: 56px; text-align: center; font-size: 13px; color: var(--text-tertiary); }

  .q-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
  .q-row:last-of-type { border-bottom: none; }
  .q-text {
    flex: 1;
    font-size: 15px;
    padding: 15px 18px;
    line-height: 1.65;
    color: var(--text-primary);
  }
  .q-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 3px; }
  .q-options { display: flex; flex-shrink: 0; border-left: 1px solid var(--border); }
  .q-btn {
    width: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    border: none;
    background: transparent;
    transition: background .12s;
    border-left: 1px solid var(--border);
    padding: 0;
  }
  .q-btn:first-child { border-left: none; }
  .q-btn:hover { background: #f5f3ec; }
  .q-btn .btn-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background .15s, transform .15s; }
  .q-btn span { font-size: 12px; color: var(--text-tertiary); }
  .q-btn.selected-yes { background: var(--green-bg); }
  .q-btn.selected-yes .btn-dot { background: var(--green); transform: scale(1.2); }
  .q-btn.selected-yes span { color: var(--green); font-weight: 500; }
  .q-btn.selected-no { background: var(--red-bg); }
  .q-btn.selected-no .btn-dot { background: var(--red); transform: scale(1.2); }
  .q-btn.selected-no span { color: var(--red); font-weight: 500; }

  /* Result */
  .result-wrap { margin-top: 28px; animation: fadeUp .5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .result-summary {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .result-top { padding: 20px 22px; border-left: 4px solid var(--brand-dark); }
  .result-total { font-family: 'Noto Serif TC', serif; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
  .result-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.75; }
  .dim-section-title { font-size: 15px; font-weight: 500; color: var(--text-secondary); margin: 24px 0 10px; padding-left: 2px; }

  .dim-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .dim-cards { grid-template-columns: 1fr; } }
  .dim-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .dim-card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; background: #f9f7f0; border-bottom: 1px solid var(--border);
  }
  .dim-card-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dim-card-title { font-size: 14px; font-weight: 500; flex: 1; color: var(--brand-dark); }
  .dim-card-score { font-size: 13px; color: var(--text-tertiary); }
  .dim-bar-track { height: 4px; background: #eee; }
  .dim-bar-fill { height: 100%; transition: width .6s ease; }
  .dim-card-body { padding: 14px; }
  .dim-status { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 9px; }
  .dim-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 11px; }
  .action-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 7px; }
  .action-item { display: flex; gap: 8px; margin-bottom: 7px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  .action-num {
    width: 19px; height: 19px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
    padding: 32px 20px;
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .footer-logo { width: 160px; margin: 0 auto 14px; display: block; }
  .footer-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 20px; }
  .footer-link {
    display: inline-block;
    background: var(--accent-orange);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    padding: 11px 28px;
    border-radius: 999px;
    text-decoration: none;
    transition: background .15s;
  }
  .footer-link:hover { background: #c96e18; }

  .reset-btn {
    display: block; margin: 18px auto 0;
    padding: 10px 24px; font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s;
  }
  .reset-btn:hover { background: #f5f3ec; }
</style>
</head>

var answers = {}, answered = 0, total = 18;

function buildQuiz() {
  var html = '';
  sections.forEach(function(sec) {
    html += '<div class="section"><div class="section-head">';
    html += '<div class="section-dot" style="background:' + sec.dotColor + '"></div>';
    html += '<div class="section-title">' + sec.fullTitle + '</div>';
    html += '<div class="section-count" id="sc-' + sec.id + '">0 / 3</div></div>';
    html += '<div class="col-header"><span>有</span><span>沒有</span></div>';
    sec.qs.forEach(function(q, qi) {
      var key = sec.id + '_' + qi;
      html += '<div class="q-row"><div class="q-text">' + q.text;
      if (q.sub) html += '<div class="q-sub">' + q.sub + '</div>';
      html += '</div><div class="q-options">';
      html += '<button class="q-btn" id="btn-' + key + '-yes" onclick="answer(\''+ key +'\',true)"><div class="btn-dot"></div><span>有</span></button>';
      html += '<button class="q-btn" id="btn-' + key + '-no" onclick="answer(\''+ key +'\',false)"><div class="btn-dot"></div><span>沒有</span></button>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('quiz').innerHTML = html;
}

function answer(key, val) {
  var wasAnswered = key in answers;
  answers[key] = val;
  if (!wasAnswered) answered++;
  document.getElementById('btn-' + key + '-yes').className = 'q-btn' + (val ? ' selected-yes' : '');
  document.getElementById('btn-' + key + '-no').className = 'q-btn' + (!val ? ' selected-no' : '');
  var fill = Math.round((answered / total) * 100);
  var bar = document.getElementById('prog-fill');
  bar.style.width = fill + '%';
  bar.style.background = fill < 50 ? '#aaa' : fill < 100 ? '#eb8424' : '#00677f';
  document.getElementById('prog-count').textContent = answered + ' / ' + total;
  document.getElementById('prog-text').textContent = answered === total ? '完成！查看結果' : '作答中…（' + fill + '%）';
  sections.forEach(function(sec) {
    var cnt = sec.qs.filter(function(q, qi) { return (sec.id + '_' + qi) in answers; }).length;
    document.getElementById('sc-' + sec.id).textContent = cnt + ' / 3';
  });
  if (answered === total) showResult();
}

function showResult() {
  var dimScores = {};
  sections.forEach(function(sec) {
    dimScores[sec.id] = sec.qs.filter(function(q, qi) { return answers[sec.id + '_' + qi] === true; }).length;
  });
  var totalYes = Object.values(dimScores).reduce(function(a, b) { return a + b; }, 0);
  var levelColor, title, desc;
  if (totalYes <= 5) {
    levelColor = '#c0392b'; title = '需要立即關注';
    desc = '孩子在多個面向都出現了困難訊號。最重要的不是加練習量，而是先找出哪個層面最薄弱，從那裡開始，一次只處理一件事。';
  } else if (totalYes <= 9) {
    levelColor = '#eb8424'; title = '有幾個地方值得留意';
    desc = '整體還在可調整的範圍，但已有早期訊號出現。找出下方得分最低的面向，這個月集中處理那一個。';
  } else if (totalYes <= 14) {
    levelColor = '#eb8424'; title = '大致健康，持續觀察';
    desc = '孩子狀態算穩定，但還有進步空間。現在介入成本最低，效果也最好。';
  } else {
    levelColor = '#00677f'; title = '目前狀態很好！';
    desc = '孩子在數學自信和學習方式上都有健康的表現，繼續維持，每月再檢視一次。';
  }
  var html = '<div class="result-wrap">';
  html += '<div class="result-summary"><div class="result-top" style="border-left-color:' + levelColor + '">';
  html += '<div class="result-total" style="color:' + levelColor + '">' + title + '（' + totalYes + ' / 18）</div>';
  html += '<div class="result-desc">' + desc + '</div></div></div>';
  html += '<div class="dim-section-title">六個面向的詳細結果與建議行動</div>';
  html += '<div class="dim-cards">';
  sections.forEach(function(sec) {
    var score = dimScores[sec.id];
    var barPct = Math.round((score / 3) * 100);
    var ak = score <= 1 ? 'low' : score === 2 ? 'mid' : 'high';
    var a = sec.actions[ak];
    var stepsHtml = a.steps.map(function(s, i) {
      return '<div class="action-item"><div class="action-num" style="background:' + a.statusBg + ';color:' + a.statusColor + '">' + (i+1) + '</div><div>' + s + '</div></div>';
    }).join('');
    html += '<div class="dim-card">';
    html += '<div class="dim-card-head"><div class="dim-card-dot" style="background:' + sec.dotColor + '"></div>';
    html += '<div class="dim-card-title">' + sec.title + '</div>';
    html += '<div class="dim-card-score">' + score + ' / 3</div></div>';
    html += '<div class="dim-bar-track"><div class="dim-bar-fill" style="width:' + barPct + '%;background:' + sec.color + '"></div></div>';
    html += '<div class="dim-card-body">';
    html += '<div class="dim-status" style="background:' + a.statusBg + ';color:' + a.statusColor + '">' + a.status + '</div>';
    html += '<div class="dim-desc">' + a.desc + '</div>';
    html += '<div class="action-label">這個月可以做的事</div>';
    html += stepsHtml + '</div></div>';
  });
  html += '</div></div>';
  document.getElementById('result-area').innerHTML = html;
  document.getElementById('reset-btn').style.display = 'block';
  setTimeout(function() {
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function reset() {
  answers = {}; answered = 0;
  var bar = document.getElementById('prog-fill');
  bar.style.width = '0%'; bar.style.background = '#ccc';
  document.getElementById('prog-count').textContent = '0 / 18';
  document.getElementById('prog-text').textContent = '請開始作答';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('reset-btn').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
